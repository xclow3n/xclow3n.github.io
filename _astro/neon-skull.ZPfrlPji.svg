<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-pink">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Neon skull -->
  <g filter="url(#neon-pink)">
    <!-- Head -->
    <ellipse cx="50" cy="45" rx="25" ry="28" stroke="#ff0080" stroke-width="3" fill="none"/>

    <!-- Eyes -->
    <ellipse cx="40" cy="40" rx="6" ry="8" stroke="#ff0080" stroke-width="2.5" fill="#ff0080" opacity="0.6"/>
    <ellipse cx="60" cy="40" rx="6" ry="8" stroke="#ff0080" stroke-width="2.5" fill="#ff0080" opacity="0.6"/>

    <!-- Nose -->
    <path d="M 47 50 L 50 55 L 53 50 Z" stroke="#ff0080" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

    <!-- Jaw -->
    <path d="M 30 60 Q 50 75, 70 60" stroke="#ff0080" stroke-width="3" fill="none"/>

    <!-- Teeth -->
    <line x1="40" y1="60" x2="40" y2="68" stroke="#ff0080" stroke-width="2"/>
    <line x1="47" y1="60" x2="47" y2="70" stroke="#ff0080" stroke-width="2"/>
    <line x1="53" y1="60" x2="53" y2="70" stroke="#ff0080" stroke-width="2"/>
    <line x1="60" y1="60" x2="60" y2="68" stroke="#ff0080" stroke-width="2"/>
  </g>
</svg>
