<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-lime">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-lime)">
    <!-- Center circle -->
    <circle cx="50" cy="50" r="10" stroke="#ccff00" stroke-width="3" fill="none"/>

    <!-- Top blade -->
    <path d="M 50 40 L 42 18 Q 50 12, 58 18 L 50 40"
          stroke="#ccff00"
          stroke-width="3"
          fill="none"
          stroke-linejoin="round"/>

    <!-- Bottom left blade -->
    <path d="M 42 55 L 18 72 Q 12 68, 15 58 L 42 55"
          stroke="#ccff00"
          stroke-width="3"
          fill="none"
          stroke-linejoin="round"/>

    <!-- Bottom right blade -->
    <path d="M 58 55 L 82 72 Q 88 68, 85 58 L 58 55"
          stroke="#ccff00"
          stroke-width="3"
          fill="none"
          stroke-linejoin="round"/>
  </g>
</svg>
