<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-potion-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-potion-glow)">
    <!-- Cork -->
    <rect x="42" y="12" width="16" height="8" rx="2" stroke="#b366ff" stroke-width="2" fill="none"/>

    <!-- Neck -->
    <path d="M 44 20 L 44 32 L 30 55 Q 25 62, 30 72 L 30 78 Q 30 85, 37 85 L 63 85 Q 70 85, 70 78 L 70 72 Q 75 62, 70 55 L 56 32 L 56 20"
          stroke="#b366ff" stroke-width="3" fill="none" stroke-linejoin="round"/>

    <!-- Liquid level -->
    <path d="M 32 62 Q 42 58, 50 62 Q 58 66, 68 62" stroke="#b366ff" stroke-width="2" fill="none" opacity="0.8"/>

    <!-- Bubbles -->
    <circle cx="42" cy="72" r="3" stroke="#b366ff" stroke-width="1.5" fill="none" opacity="0.8">
      <animate attributeName="cy" values="72;65;72" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="76" r="2" stroke="#b366ff" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="cy" values="76;68;76" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="80" r="1.5" stroke="#b366ff" stroke-width="1.5" fill="none" opacity="0.7">
      <animate attributeName="cy" values="80;70;80" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Sparkle on glass -->
    <path d="M 36 42 L 38 38 L 40 42" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>

    <!-- Skull label on bottle -->
    <circle cx="50" cy="72" r="5" stroke="#b366ff" stroke-width="1.5" fill="none" opacity="0.5"/>
    <line x1="48" y1="71" x2="48" y2="71" stroke="#b366ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="52" y1="71" x2="52" y2="71" stroke="#b366ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M 48 75 L 50 76 L 52 75" stroke="#b366ff" stroke-width="1" fill="none" opacity="0.4"/>
  </g>
</svg>
