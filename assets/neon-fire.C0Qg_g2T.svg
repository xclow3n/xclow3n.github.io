<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-orange">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-orange)">
    <!-- Main flame -->
    <path d="M 50 85 Q 35 75, 35 60 Q 35 45, 45 35 Q 45 25, 50 15 Q 55 25, 55 35 Q 65 45, 65 60 Q 65 75, 50 85 Z"
          stroke="#ff6600"
          stroke-width="3"
          fill="none"
          stroke-linejoin="round"/>

    <!-- Inner flame -->
    <path d="M 50 75 Q 42 68, 42 58 Q 42 48, 50 35 Q 58 48, 58 58 Q 58 68, 50 75 Z"
          stroke="#ffaa00"
          stroke-width="2.5"
          fill="none"
          opacity="0.8"
          stroke-linejoin="round"/>

    <!-- Core -->
    <path d="M 50 65 Q 46 60, 46 54 Q 46 48, 50 42 Q 54 48, 54 54 Q 54 60, 50 65 Z"
          stroke="#ffff00"
          stroke-width="2"
          fill="none"
          opacity="0.9"
          stroke-linejoin="round"/>
  </g>
</svg>
