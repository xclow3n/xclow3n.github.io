<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-cross-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-cross-glow)">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="35" stroke="#00ffff" stroke-width="2.5" fill="none" stroke-dasharray="8,4"/>

    <!-- Inner ring -->
    <circle cx="50" cy="50" r="18" stroke="#00ffff" stroke-width="2" fill="none"/>

    <!-- Center dot -->
    <circle cx="50" cy="50" r="3" fill="#00ffff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Crosshair lines -->
    <line x1="50" y1="10" x2="50" y2="30" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="70" x2="50" y2="90" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="10" y1="50" x2="30" y2="50" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70" y1="50" x2="90" y2="50" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Corner tick marks -->
    <line x1="25" y1="25" x2="30" y2="30" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="75" y1="25" x2="70" y2="30" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="25" y1="75" x2="30" y2="70" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="75" y1="75" x2="70" y2="70" stroke="#00ffff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
