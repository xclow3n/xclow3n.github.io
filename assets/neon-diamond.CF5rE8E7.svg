<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-cyan">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-cyan)">
    <!-- Diamond outline -->
    <path d="M 50 15 L 75 35 L 50 85 L 25 35 Z"
          stroke="#00ffff"
          stroke-width="3"
          fill="none"
          stroke-linejoin="round"/>

    <!-- Inner facets -->
    <line x1="50" y1="15" x2="50" y2="85" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <line x1="25" y1="35" x2="75" y2="35" stroke="#00ffff" stroke-width="2" opacity="0.7"/>
    <line x1="35" y1="35" x2="50" y2="65" stroke="#00ffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="65" y1="35" x2="50" y2="65" stroke="#00ffff" stroke-width="1.5" opacity="0.5"/>

    <!-- Sparkles -->
    <circle cx="50" cy="20" r="2" fill="#ffffff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="62" cy="30" r="1.5" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
