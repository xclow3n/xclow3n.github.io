<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <filter id="neon-red">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-red)">
    <!-- Fuse -->
    <path d="M 55 20 Q 60 15, 62 12" stroke="#ff3333" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Spark -->
    <circle cx="63" cy="10" r="3" fill="#ffff00" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="60" y1="8" x2="58" y2="5" stroke="#ffff00" stroke-width="1.5" opacity="0.8"/>
    <line x1="66" y1="8" x2="68" y2="5" stroke="#ffff00" stroke-width="1.5" opacity="0.8"/>
    <line x1="65" y1="12" x2="68" y2="14" stroke="#ffff00" stroke-width="1.5" opacity="0.8"/>

    <!-- Bomb body -->
    <circle cx="50" cy="55" r="30" stroke="#ff3333" stroke-width="3" fill="none"/>

    <!-- Highlight -->
    <path d="M 35 40 Q 40 35, 45 38" stroke="#ff6666" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
