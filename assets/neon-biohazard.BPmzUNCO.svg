    <path d="M 28 70 Q 38 78, 48 72" stroke="#00ff00" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="28" cy="70" r="5" stroke="#00ff00" stroke-width="2.5" fill="none"/>

    <!-- Bottom right symbol -->
    <path d="M 72 70 Q 72 55, 62 50" stroke="#00ff00" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 72 70 Q 62 78, 52 72" stroke="#00ff00" stroke-width="3" fill="none" stroke-linecap="round"/>
